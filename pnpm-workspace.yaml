# pnpm 11 blocks all dependency build scripts by default. Each package that
# legitimately needs to run install/postinstall scripts must be listed here
# with `true`. Only this directory is checked out in Cloudflare Pages CI, so
# the allowlist must live locally.
#
# This block is kept identical (a superset) across all deployed mindoodb apps
# and mindoodb-haven so a single fix lands everywhere. Entries for packages a
# given app does not use are harmless. Keep it in sync.
allowBuilds:
  "@swc/core": true
  esbuild: true
  sharp: true
  tesseract.js: true
  vue-demi: true
  workerd: true

# First-party packages are published by us during release workflows, so they
# do not need pnpm's minimum release age delay in Cloudflare Pages builds.
minimumReleaseAgeExclude:
  - mindoodb
  - mindoodb-app-sdk
  - mindoodb-view-language
